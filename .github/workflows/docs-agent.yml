name: Docs Agent

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: GitHub repository to generate docs for, in OWNER/REPO format.
        required: true
      flow_kind:
        description: Which docs flow to run.
        type: choice
        options:
          - technical-docs-bootstrap-flow
          - technical-docs-maintenance-flow
          - technical-docs-flow
          - user-docs-bootstrap-flow
          - user-docs-maintenance-flow
          - user-docs-flow
        default: technical-docs-maintenance-flow
      prompt:
        description: Override the default prompt (optional).
        required: false
      openai_model:
        description: OpenAI model to use.
        required: false
        default: gpt-5.5

jobs:
  run-docs-agent:
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/docs-agent
      agent_slug: docs-agent
      pipeline_slug: ${{ contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-pipeline' || 'user-docs-pipeline' }}
      flow_slug: ${{ inputs.flow_kind }}
      target_repo: ${{ inputs.target_repo }}
      prompt: >-
        ${{
          inputs.prompt != '' &&
          inputs.prompt ||
          (
            contains(inputs.flow_kind, 'technical-docs-bootstrap') &&
            'Run the technical docs bootstrap flow. Build the broadest complete initial developer documentation surface possible from source code, tests, existing docs, issues, and pull requests. Open one documentation PR unless the repo already has complete technical docs.' ||
            contains(inputs.flow_kind, 'technical-docs') &&
            'Run the technical docs maintenance flow. Update developer-facing living documentation only where source code, tests, recent issues, recent pull requests, or existing docs show stale, missing, fragmented, or misleading coverage. Open a documentation PR only if needed.' ||
            contains(inputs.flow_kind, 'user-docs-bootstrap') &&
            'Run the user docs bootstrap flow. Build the broadest complete initial user-facing documentation surface possible from source code, UI strings, existing docs, issues, and pull requests. Open one documentation PR unless the repo already has complete user docs.' ||
            'Run the user docs maintenance flow. Update non-technical user-facing living documentation only where source code, UI strings, recent issues, recent pull requests, or existing docs show stale, missing, fragmented, or misleading coverage. Open a documentation PR only if needed.'
          )
        }}
      model: ${{ inputs.openai_model }}
      validation_dependencies: Automattic/agents-api@main,Extra-Chill/data-machine@main,Extra-Chill/data-machine-code@main,WordPress/ai-provider-for-openai@main
      runner_workspace: |
        {
          "enabled": true,
          "repo": "${{ inputs.target_repo }}",
          "clone_url": "https://github.com/${{ inputs.target_repo }}.git",
          "branch_prefix": "docs/agent-run",
          "from": "origin/main",
          "bootstrap": false
        }
      success_requires_pr: false
      extra_required_abilities: |
        [
          "datamachine/workspace-worktree-add"
        ]
      app_token_repos: ${{ inputs.target_repo }}
      engine_data_outputs: '{"docs_pr_url":"metadata.engine_data.docs_agent.pr_url"}'
      transcript_artifact_name: docs-agent-transcript-${{ github.run_id }}
      bundle_validator_spec: tests/docs-agent.validate-bundle-spec.json
    secrets: inherit
