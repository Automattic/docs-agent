name: Docs Agent Recipe

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: GitHub repository to prepare docs for, in OWNER/REPO format.
        required: true
      flow_kind:
        description: Which docs flow to prepare.
        type: choice
        options:
          - technical-docs-bootstrap-flow
          - technical-docs-maintenance-flow
          - user-docs-bootstrap-flow
          - user-docs-maintenance-flow
          - skills-maintenance-flow
        default: technical-docs-maintenance-flow
      prompt:
        description: Override the default prompt (optional).
        required: false
      writable_paths:
        description: Comma-separated repository paths the agent may stage and include in the PR.
        required: true
        default: README.md,docs/**

jobs:
  prepare:
    name: Prepare Docs Agent Recipe
    runs-on: ubuntu-latest
    steps:
      - name: Prepare recipe summary
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          FLOW_KIND: ${{ inputs.flow_kind }}
          PROMPT: ${{ inputs.prompt }}
          WRITABLE_PATHS: ${{ inputs.writable_paths }}
        run: |
          set -euo pipefail
          case "$FLOW_KIND" in
            technical-docs-bootstrap-flow|technical-docs-maintenance-flow)
              bundle_path="bundles/technical-docs-agent"
              ;;
            user-docs-bootstrap-flow|user-docs-maintenance-flow)
              bundle_path="bundles/user-docs-agent"
              ;;
            skills-maintenance-flow)
              bundle_path="bundles/skills-agent"
              ;;
            *)
              printf 'Unsupported flow_kind: %s\n' "$FLOW_KIND" >&2
              exit 1
              ;;
          esac

          {
            printf '## Docs Agent recipe\n\n'
            printf -- '- Target repository: `%s`\n' "$TARGET_REPO"
            printf -- '- Flow: `%s`\n' "$FLOW_KIND"
            printf -- '- Bundle: `%s`\n' "$bundle_path"
            printf -- '- Writable paths: `%s`\n' "$WRITABLE_PATHS"
            printf '\nThis workflow is runner-neutral. Run the selected bundle with a caller-owned execution environment and provider.\n'
          } >> "$GITHUB_STEP_SUMMARY"
