name: Docs Agent

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: GitHub repository to generate docs for, in OWNER/REPO format.
        required: true
      flow_kind:
        description: Which docs flow to run.
        type: choice
        options:
          - technical-docs-bootstrap-flow
          - technical-docs-maintenance-flow
          - user-docs-bootstrap-flow
          - user-docs-maintenance-flow
          - skills-maintenance-flow
        default: technical-docs-maintenance-flow
      prompt:
        description: Override the default prompt (optional).
        required: false
      openai_model:
        description: OpenAI model to use.
        required: false
        default: gpt-5.5
      writable_paths:
        description: Comma-separated repository paths the agent may stage and include in the PR.
        required: true
        default: README.md,docs/**

jobs:
  prepare:
    name: Prepare Docs Agent Runner Recipe
    runs-on: ubuntu-latest
    outputs:
      runner_recipe_id: ${{ steps.recipe.outputs.runner_recipe_id }}
      runtime: ${{ steps.recipe.outputs.runtime }}
      runtime_ref: ${{ steps.recipe.outputs.runtime_ref }}
      profile: ${{ steps.recipe.outputs.profile }}
      runtime_profiles: ${{ steps.recipe.outputs.runtime_profiles }}
      openai_provider_ref: ${{ steps.recipe.outputs.openai_provider_ref }}
      component_contracts: ${{ steps.recipe.outputs.component_contracts }}
      ability_requirements: ${{ steps.recipe.outputs.ability_requirements }}
      runtime_config: ${{ steps.recipe.outputs.runtime_config }}
    steps:
      - name: Checkout docs-agent
        uses: actions/checkout@v4

      - name: Resolve runner recipe
        id: recipe
        env:
          RUNNER_RECIPE_CHECKOUT: .
        run: php ci/resolve-docs-agent-runner-recipe.php

  run-docs-agent:
    needs: prepare
    uses: Extra-Chill/homeboy-extensions/.github/workflows/runtime-agent-full-run.yml@main
    with:
      homeboy_extensions_ref: main
      runtime: ${{ needs.prepare.outputs.runtime }}
      runtime_ref: ${{ needs.prepare.outputs.runtime_ref }}
      profile: ${{ needs.prepare.outputs.profile }}
      runtime_profiles: ${{ needs.prepare.outputs.runtime_profiles }}
      runtime_execution: ${{ format('{{"kind":"bundle","source":"{0}"}}', contains(inputs.flow_kind, 'skills') && 'bundles/skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'bundles/technical-docs-agent' || 'bundles/user-docs-agent')) }}
      workload_id: ${{ inputs.flow_kind }}
      workload_label: Run ${{ contains(inputs.flow_kind, 'skills') && 'skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-agent' || 'user-docs-agent') }} Docs Agent
      component_id: docs-agent-ci-driver
      target_repo: ${{ inputs.target_repo }}
      prompt: |
        ${{
          inputs.prompt != '' &&
          inputs.prompt ||
          (
            contains(inputs.flow_kind, 'technical-docs-bootstrap') &&
            'Run the technical docs bootstrap flow. Build the broadest complete initial developer documentation surface possible from source code, tests, existing docs, issues, and pull requests. Write docs in the provided workspace unless the repo already has complete technical docs.' ||
            contains(inputs.flow_kind, 'technical-docs') &&
            'Run the technical docs maintenance flow. Update developer-facing living documentation only where source code, tests, recent issues, recent pull requests, or existing docs show stale, missing, fragmented, or misleading coverage. Write docs in the provided workspace.' ||
            contains(inputs.flow_kind, 'user-docs-bootstrap') &&
            'Run the user docs bootstrap flow. Build the broadest complete initial non-technical product documentation surface possible for frontend users from product-facing evidence, existing user docs, UI strings, support-style issues, release notes, and pull requests describing user-visible behavior. Use a separate user-docs namespace such as docs/user/. Write docs in the provided workspace unless the repo already has complete user docs.' ||
            contains(inputs.flow_kind, 'skills') &&
            'Run the skills maintenance flow. Update live agent skill instructions and generated packaged skill outputs only where skill files, build scripts, generated outputs, upstream tool behavior, recent issues, or recent pull requests show stale, missing, fragmented, or misleading executable guidance. Keep changes inside the configured skills/package writable paths, run required verification such as build commands, repository checks, and generated-output drift checks, and write changes in the provided workspace.' ||
            'Run the user docs maintenance flow. Update non-technical product documentation only where product-facing evidence, existing user docs, UI strings, support-style issues, release notes, or recent pull requests show stale, missing, fragmented, or misleading user guidance. Keep changes in the user-docs namespace and write docs in the provided workspace.'
          )
        }}

        Writable paths: ${{ inputs.writable_paths }}
      writable_paths: ${{ inputs.writable_paths }}
      provider: openai
      model: ${{ inputs.openai_model }}
      openai_provider_ref: ${{ needs.prepare.outputs.openai_provider_ref }}
      component_contracts: ${{ needs.prepare.outputs.component_contracts }}
      runner_workspace: |
        {
          "enabled": true,
          "repo": "${{ inputs.target_repo }}",
          "clone_url": "https://github.com/${{ inputs.target_repo }}.git",
          "branch_prefix": "docs/agent-run",
          "from": "origin/main",
          "bootstrap": false
        }
      runtime_config: ${{ needs.prepare.outputs.runtime_config }}
      success_requires_pr: false
      success_completion_outcomes: '[]'
      app_token_repos: ${{ inputs.target_repo }}
      require_homeboy_app_token: true
      allowed_repos: '["${{ inputs.target_repo }}"]'
      ability_requirements: ${{ needs.prepare.outputs.ability_requirements }}
      tool_results_key: github_tool_results
      runtime_output_projections: '{"docs_pr_url":"metadata.engine_data.docs_agent.pr_url"}'
      transcript_artifact_name: docs-agent-transcript-${{ github.run_id }}
      replay_bundle_artifact_name: docs-agent-replay-${{ github.run_id }}
      expected_artifacts: '["docs_agent_transcript","docs_agent_change_summary","docs_agent_verification_report","docs_agent_drift_report","docs_agent_workspace_publication"]'
      artifact_declarations: |
        [
          {
            "schema": "wp-codebox/artifact-declaration/v1",
            "name": "docs_agent_transcript",
            "type": "DocsAgentTranscript",
            "artifact_schema": "docs-agent/transcript/v1",
            "description": "Machine-readable transcript for the Docs Agent run.",
            "required": false,
            "egress": ["artifact", "workflow-output", "review-link"]
          },
          {
            "schema": "wp-codebox/artifact-declaration/v1",
            "name": "docs_agent_change_summary",
            "type": "DocsAgentChangeSummary",
            "artifact_schema": "docs-agent/change-summary/v1",
            "description": "Reviewable summary of documentation or skill changes made by the run.",
            "required": false,
            "egress": ["pr-body", "workflow-output", "review-link"]
          },
          {
            "schema": "wp-codebox/artifact-declaration/v1",
            "name": "docs_agent_verification_report",
            "type": "DocsAgentVerificationReport",
            "artifact_schema": "docs-agent/verification-report/v1",
            "description": "Runner verification command results for the target workspace.",
            "required": false,
            "egress": ["pr-body", "workflow-output", "review-link"]
          },
          {
            "schema": "wp-codebox/artifact-declaration/v1",
            "name": "docs_agent_drift_report",
            "type": "DocsAgentDriftReport",
            "artifact_schema": "docs-agent/drift-report/v1",
            "description": "Drift-check results for generated documentation, skills, or packaged outputs.",
            "required": false,
            "egress": ["pr-body", "workflow-output", "review-link"]
          },
          {
            "schema": "wp-codebox/artifact-declaration/v1",
            "name": "docs_agent_workspace_publication",
            "type": "DocsAgentWorkspacePublication",
            "artifact_schema": "docs-agent/workspace-publication/v1",
            "description": "Canonical branch and pull request links published by the runner workspace.",
            "required": false,
            "egress": ["pr-body", "workflow-output", "review-link"]
          }
        ]
      callback_data: ${{ format('{{"agent_slug":"{0}","pipeline_slug":"{1}","flow_slug":"{2}","bundle_source":"{3}","target_repo":"{4}"}}', contains(inputs.flow_kind, 'skills') && 'skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-agent' || 'user-docs-agent'), contains(inputs.flow_kind, 'skills') && 'skills-pipeline' || (contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-pipeline' || 'user-docs-pipeline'), inputs.flow_kind, contains(inputs.flow_kind, 'skills') && 'bundles/skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'bundles/technical-docs-agent' || 'bundles/user-docs-agent'), inputs.target_repo) }}
    secrets: inherit
