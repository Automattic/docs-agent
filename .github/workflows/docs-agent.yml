name: Docs Agent

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: GitHub repository to generate docs for, in OWNER/REPO format.
        required: true
      flow_kind:
        description: Which docs flow to run.
        type: choice
        options:
          - technical-docs-bootstrap-flow
          - technical-docs-maintenance-flow
          - user-docs-bootstrap-flow
          - user-docs-maintenance-flow
          - skills-maintenance-flow
        default: technical-docs-maintenance-flow
      prompt:
        description: Override the default prompt (optional).
        required: false
      openai_model:
        description: OpenAI model to use.
        required: false
        default: gpt-5.5
      writable_paths:
        description: Comma-separated repository paths the agent may stage and include in the PR.
        required: true
        default: README.md,docs/**

jobs:
  run-docs-agent:
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@debfe4bd6f40f74a651751ac9af0cb3aabcb6df3
    with:
      bundle_path: ${{ contains(inputs.flow_kind, 'skills') && 'bundles/skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'bundles/technical-docs-agent' || 'bundles/user-docs-agent') }}
      agent_slug: ${{ contains(inputs.flow_kind, 'skills') && 'skills-agent' || (contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-agent' || 'user-docs-agent') }}
      pipeline_slug: ${{ contains(inputs.flow_kind, 'skills') && 'skills-pipeline' || (contains(inputs.flow_kind, 'technical-docs') && 'technical-docs-pipeline' || 'user-docs-pipeline') }}
      flow_slug: ${{ inputs.flow_kind }}
      target_repo: ${{ inputs.target_repo }}
      prompt: |
        ${{
          inputs.prompt != '' &&
          inputs.prompt ||
          (
            contains(inputs.flow_kind, 'technical-docs-bootstrap') &&
            'Run the technical docs bootstrap flow. Build the broadest complete initial developer documentation surface possible from source code, tests, existing docs, issues, and pull requests. Write docs in the provided workspace unless the repo already has complete technical docs.' ||
            contains(inputs.flow_kind, 'technical-docs') &&
            'Run the technical docs maintenance flow. Update developer-facing living documentation only where source code, tests, recent issues, recent pull requests, or existing docs show stale, missing, fragmented, or misleading coverage. Write docs in the provided workspace.' ||
            contains(inputs.flow_kind, 'user-docs-bootstrap') &&
            'Run the user docs bootstrap flow. Build the broadest complete initial non-technical product documentation surface possible for frontend users from product-facing evidence, existing user docs, UI strings, support-style issues, release notes, and pull requests describing user-visible behavior. Use a separate user-docs namespace such as docs/user/. Write docs in the provided workspace unless the repo already has complete user docs.' ||
            contains(inputs.flow_kind, 'skills') &&
            'Run the skills maintenance flow. Update live agent skill instructions and generated packaged skill outputs only where skill files, build scripts, generated outputs, upstream tool behavior, recent issues, or recent pull requests show stale, missing, fragmented, or misleading executable guidance. Keep changes inside the configured skills/package writable paths, run required verification such as build commands, repository checks, and generated-output drift checks, and write changes in the provided workspace.' ||
            'Run the user docs maintenance flow. Update non-technical product documentation only where product-facing evidence, existing user docs, UI strings, support-style issues, release notes, or recent pull requests show stale, missing, fragmented, or misleading user guidance. Keep changes in the user-docs namespace and write docs in the provided workspace.'
          )
        }}

        Writable paths: ${{ inputs.writable_paths }}
      writable_paths: ${{ inputs.writable_paths }}
      model: ${{ inputs.openai_model }}
      wp_codebox_ref: 84fc33216b3026c43caf9ac1c33c2ebe4be06bf2
      agents_api_ref: a61461da12ccdc90eb1a844714761b6c19360bfe
      data_machine_ref: 4fc462fafe748f1278426c01ed0480e2aa94a934
      data_machine_code_ref: 4b0c630804568e2377fd57d1c49edca8b5423e19
      openai_provider_ref: a400c158707e3d0b6fcd0f1502f6aa1085b01b9b
      validation_dependencies: Automattic/agents-api@a61461da12ccdc90eb1a844714761b6c19360bfe,Extra-Chill/data-machine@4fc462fafe748f1278426c01ed0480e2aa94a934,Extra-Chill/data-machine-code@4b0c630804568e2377fd57d1c49edca8b5423e19
      runner_workspace: |
        {
          "enabled": true,
          "repo": "${{ inputs.target_repo }}",
          "clone_url": "https://github.com/${{ inputs.target_repo }}.git",
          "branch_prefix": "docs/agent-run",
          "from": "origin/main",
          "bootstrap": false
        }
      extra_wp_config_defines: |
        {
          "DOCS_AGENT_TARGET_REPO": "${{ inputs.target_repo }}",
          "DOCS_AGENT_WRITABLE_PATHS": "${{ inputs.writable_paths }}"
        }
      extra_wp_codebox_mounts: |
        [
          {
            "type": "file",
            "source": "ci/docs-agent-workspace-policy.php",
            "target": "/wordpress/wp-content/mu-plugins/docs-agent-workspace-policy.php",
            "mode": "readonly"
          }
        ]
      success_requires_pr: false
      extra_required_abilities: |
        [
          "datamachine/workspace-worktree-add"
        ]
      app_token_repos: ${{ inputs.target_repo }}
      require_homeboy_app_token: true
      allowed_repos: '["${{ inputs.target_repo }}"]'
      engine_data_outputs: '{"docs_pr_url":"metadata.engine_data.docs_agent.pr_url"}'
      transcript_artifact_name: docs-agent-transcript-${{ github.run_id }}
      bundle_validator_spec: ${{ contains(inputs.flow_kind, 'skills') && 'tests/skills-agent.validate-bundle-spec.json' || (contains(inputs.flow_kind, 'technical-docs') && 'tests/technical-docs-agent.validate-bundle-spec.json' || 'tests/user-docs-agent.validate-bundle-spec.json') }}
    secrets: inherit
