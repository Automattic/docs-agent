name: Docs Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Instruction for Docs Agent.
        required: true
        default: Generate or update technical developer documentation from source code. Open a documentation PR only if needed.
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      docs_agent_flow:
        description: Docs Agent flow slug to run.
        type: choice
        required: true
        options:
          - technical-docs-bootstrap-flow
          - technical-docs-maintenance-flow
          - technical-docs-flow
          - skills-maintenance-flow
          - skills-flow
        default: technical-docs-maintenance-flow
      docs_agent_ref:
        description: Docs Agent release tag, branch, or SHA.
        required: true
        default: v0.1.0

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    name: Prepare Docs Agent config
    runs-on: ubuntu-latest
    outputs:
      docs_branch: ${{ steps.config.outputs.docs_branch }}
      success_requires_pr: ${{ steps.config.outputs.success_requires_pr }}
      fallback_pr_title: ${{ steps.config.outputs.fallback_pr_title }}
      completion_instruction: ${{ steps.config.outputs.completion_instruction }}
      bundle_path: ${{ steps.config.outputs.bundle_path }}
      agent_slug: ${{ steps.config.outputs.agent_slug }}
      pipeline_slug: ${{ steps.config.outputs.pipeline_slug }}
      allowed_file_paths_json: ${{ steps.config.outputs.allowed_file_paths_json }}
      writable_paths_text: ${{ steps.config.outputs.writable_paths_text }}
    steps:
      - name: Resolve flow settings
        id: config
        env:
          DOCS_AGENT_FLOW: ${{ inputs.docs_agent_flow }}
        run: |
          set -euo pipefail

          success_requires_pr="false"
          docs_branch="docs-agent/developer-docs"
          fallback_pr_title="Update developer documentation"
          bundle_path="bundles/technical-docs-agent"
          agent_slug="technical-docs-agent"
          pipeline_slug="technical-docs-pipeline"
          allowed_file_paths_json='["README.md", "docs/**"]'
          writable_paths_text="README.md, docs/**"
          completion_instruction="Preserve the existing documentation taxonomy. Write only README.md and docs/**. If no documentation update is needed, finish cleanly without opening a pull request. If an update is needed, open one focused documentation pull request."

          if [[ "$DOCS_AGENT_FLOW" == *-bootstrap-flow ]]; then
            success_requires_pr="true"
            docs_branch="docs-agent/developer-bootstrap-docs"
            fallback_pr_title="Bootstrap developer documentation"
            completion_instruction="This is a bootstrap run. Build a complete, clean, hierarchical developer documentation surface under README.md and docs/**, then open one focused documentation pull request. A no_changes outcome is invalid for this bootstrap proof."
          fi

          if [[ "$DOCS_AGENT_FLOW" == skills-* ]]; then
            docs_branch="docs-agent/build-with-wordpress-skills"
            fallback_pr_title="Update live agent skills"
            bundle_path="bundles/skills-agent"
            agent_slug="skills-agent"
            pipeline_slug="skills-pipeline"
            allowed_file_paths_json='["skills/**", "plugins/**/skills/**", "plugins/**/README.md"]'
            writable_paths_text="skills/**, plugins/**/skills/**, plugins/**/README.md"
            completion_instruction="This is the skills maintenance lane, separate from technical docs upkeep. Maintain live skill instructions and generated packaged copies only inside the configured skills/package paths. For build-with-wordpress, use the canonical branch docs-agent/build-with-wordpress-skills, run pnpm build, pnpm verify, and a generated-output drift check after build, then open one focused skills pull request only if changes are needed."
          fi

          {
            printf 'docs_branch=%s\n' "$docs_branch"
            printf 'success_requires_pr=%s\n' "$success_requires_pr"
            printf 'fallback_pr_title=%s\n' "$fallback_pr_title"
            printf 'bundle_path=%s\n' "$bundle_path"
            printf 'agent_slug=%s\n' "$agent_slug"
            printf 'pipeline_slug=%s\n' "$pipeline_slug"
            printf 'allowed_file_paths_json=%s\n' "$allowed_file_paths_json"
            printf 'writable_paths_text=%s\n' "$writable_paths_text"
            printf 'completion_instruction<<EOF\n%s\nEOF\n' "$completion_instruction"
          } >> "$GITHUB_OUTPUT"

  docs-agent:
    name: Run Docs Agent
    needs: prepare
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@wordpress-v2.108.3
    with:
      bundle_path: ${{ needs.prepare.outputs.bundle_path }}
      bundle_repo: https://github.com/Automattic/docs-agent.git
      bundle_ref: ${{ inputs.docs_agent_ref }}
      bundle_path_in_repo: ${{ needs.prepare.outputs.bundle_path }}
      agent_slug: ${{ needs.prepare.outputs.agent_slug }}
      pipeline_slug: ${{ needs.prepare.outputs.pipeline_slug }}
      flow_slug: ${{ inputs.docs_agent_flow }}
      target_repo: ${{ github.repository }}
      model: ${{ inputs.openai_model }}
      success_requires_pr: ${{ needs.prepare.outputs.success_requires_pr == 'true' }}
      max_turns: 20
      step_budget: 24
      time_budget_ms: 600000
      engine_key: docs_agent
      tool_results_key: github_tool_results
      extra_required_abilities: '["datamachine/create-or-update-github-file"]'
      allowed_repos: '["${{ github.repository }}"]'
      tool_recorders: |
        [
          {
            "tool": "create_or_update_github_file",
            "forced_parameters": {
              "allowed_file_paths": ${{ needs.prepare.outputs.allowed_file_paths_json }},
              "branch": "${{ needs.prepare.outputs.docs_branch }}"
            },
            "record": {
              "engine_key": "docs_agent",
              "tool_results_key": "github_tool_results"
            }
          },
          {
            "tool": "create_github_pull_request",
            "record": {
              "engine_key": "docs_agent",
              "tool_results_key": "github_tool_results",
              "event": {
                "key": "pr",
                "type": "pull_request",
                "only_if_success": true
              }
            }
          }
        ]
      fallback_pull_request: |
        {
          "repo": "${{ github.repository }}",
          "title": "${{ needs.prepare.outputs.fallback_pr_title }}",
          "head": "${{ needs.prepare.outputs.docs_branch }}",
          "base": "${{ github.event.repository.default_branch }}",
          "body": "## Summary\n- Generate or update the selected Docs Agent lane from repository source.\n- Keep changes inside the configured writable paths.\n- Generated by the Docs Agent workflow.\n\n## AI assistance\n- **AI assistance:** Yes\n- **Tool(s):** Docs Agent via OpenCode (GPT-5.5)\n- **Used for:** Generated maintenance draft from repository source for human review."
        }
      engine_data_outputs: '{"docs_agent_pr_url":"metadata.engine_data.docs_agent.pr.url","success_status":"metadata.success_status"}'
      transcript_artifact_name: docs-agent-transcript-${{ github.run_id }}
      prompt: |
        ${{ inputs.prompt }}

        Target repository: ${{ github.repository }}
        Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        Writable paths: ${{ needs.prepare.outputs.writable_paths_text }}

        Run the selected Docs Agent lane from repository evidence. ${{ needs.prepare.outputs.completion_instruction }}
    secrets: inherit
