name: Docs Agent

on:
  workflow_dispatch:
    inputs:
      run_agent:
        description: Run Docs Agent. Set false when a preflight already proved docs are current.
        type: boolean
        default: true
      prompt:
        description: Optional additional maintenance instruction.
        required: false
        default: ""
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  docs-agent:
    name: Maintain Docs
    uses: Automattic/docs-agent/.github/workflows/maintain-docs.yml@main
    with:
      audience: technical
      base_ref: trunk
      docs_branch: docs-agent/example-docs
      writable_paths: README.md,docs/**
      context_repositories: '[{"alias":"agents-api","repository":"Automattic/agents-api","revision":"main"}]'
      source_delta: '[{"id":"agents-api-runtime-contract","source_refs":["src/runtime/**","tests/runtime/**"],"requires_documentation_change":false}]'
      prompt: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || '' }}
      run_agent: ${{ github.event_name != 'workflow_dispatch' || inputs.run_agent }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EXTERNAL_PACKAGE_SOURCE_POLICY: ${{ secrets.DOCS_AGENT_EXTERNAL_PACKAGE_SOURCE_POLICY }}
